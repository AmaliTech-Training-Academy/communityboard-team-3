spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/communityboard}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  sql:
    init:
      mode: never
      platform: postgres

# Secondary analytics datasource
analytics:
  datasource:
    url: ${ANALYTICS_DATASOURCE_URL:jdbc:postgresql://localhost:5434/analyticsdb}
    username: ${ANALYTICS_DB_USER:postgres}
    password: ${ANALYTICS_DB_PASSWORD:postgres}
  encryption:
    key: ${ETL_KMS_KEY}

jwt:
  secret: ${JWT_SECRET:communityboard-secret-key-amalitech-2024}
  expiration: 86400000

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
