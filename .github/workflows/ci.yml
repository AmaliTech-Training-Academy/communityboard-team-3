name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DB_NAME: ${{ vars.DB_NAME }}
  DB_USER: ${{ vars.DB_USER }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  ETL_KMS_KEY: ${{ secrets.ETL_KMS_KEY }}
  ANALYTICS_DB_NAME: ${{ vars.ANALYTICS_DB_NAME }}
  ANALYTICS_DB_USER: ${{ vars.ANALYTICS_DB_USER }}
  ANALYTICS_DB_PASSWORD: ${{ secrets.ANALYTICS_DB_PASSWORD }}

jobs:
  backend-build-test:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build backend with Maven
        run: |
          cd backend
          mvn clean compile

      - name: Run backend tests
        run: |
          cd backend
          mvn test
        continue-on-error: true

      - name: Generate Allure results
        if: always()
        run: |
          cd backend
          mvn allure:report || echo "Allure report generation skipped"

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-allure-results
          path: backend/target/allure-results
          retention-days: 30

      - name: Upload backend Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-allure-report
          path: backend/target/site/allure-maven-plugin
          retention-days: 30

      - name: Package backend
        run: |
          cd backend
          mvn package -DskipTests

  frontend-build-test:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: |
          cd frontend
          pnpm install --frozen-lockfile --prod=false

      - name: Run linting
        run: |
          cd frontend
          pnpm run lint || echo "Lint step skipped - not configured"

      - name: Run frontend tests with coverage
        run: |
          cd frontend
          pnpm test -- --watchAll=false --coverage || echo "No tests found"
        continue-on-error: true

      - name: Upload frontend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: frontend/coverage
          retention-days: 30

      - name: Build frontend
        run: |
          cd frontend
          pnpm run build

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [backend-build-test, frontend-build-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build backend Docker image
        run: |
          cd backend
          docker build -t communityboard-backend:test .

      - name: Build frontend Docker image
        run: |
          cd frontend
          docker build -t communityboard-frontend:test .

      - name: Build data-engineering Docker image
        run: |
          cd data-engineering
          docker build -t communityboard-data:test .

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create .env file
        run: |
          echo "DB_NAME=$DB_NAME" >> .env
          echo "DB_USER=$DB_USER" >> .env
          echo "DB_PASSWORD=$DB_PASSWORD" >> .env
          echo "JWT_SECRET=$JWT_SECRET" >> .env
          echo "ETL_KMS_KEY=$ETL_KMS_KEY" >> .env
          echo "ANALYTICS_DB_NAME=$ANALYTICS_DB_NAME" >> .env
          echo "ANALYTICS_DB_USER=$ANALYTICS_DB_USER" >> .env
          echo "ANALYTICS_DB_PASSWORD=$ANALYTICS_DB_PASSWORD" >> .env

      - name: Start services with docker compose
        run: |
          docker compose up -d
          sleep 30

      - name: Check backend health
        run: |
          curl -f http://localhost:8080/api-docs || curl -f http://localhost:8080/swagger-ui.html || echo "Backend check: service may not have health endpoint yet"

      - name: Check frontend
        run: |
          curl -f http://localhost:3000 || echo "Frontend check: service may not be ready yet"

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop services
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Create .env content
        run: |
          echo "DB_NAME=$DB_NAME" >> env_file
          echo "DB_USER=$DB_USER" >> env_file
          echo "DB_PASSWORD=$DB_PASSWORD" >> env_file
          echo "JWT_SECRET=$JWT_SECRET" >> env_file
          echo "ETL_KMS_KEY=$ETL_KMS_KEY" >> env_file
          echo "ANALYTICS_DB_NAME=$ANALYTICS_DB_NAME" >> env_file
          echo "ANALYTICS_DB_USER=$ANALYTICS_DB_USER" >> env_file
          echo "ANALYTICS_DB_PASSWORD=$ANALYTICS_DB_PASSWORD" >> env_file

      - name: Deploy to EC2
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "$SSH_KEY" > deploy_key
          chmod 600 deploy_key
          scp -o StrictHostKeyChecking=no -i deploy_key env_file ubuntu@$EC2_HOST:/home/ubuntu/communityboard-team-3/.env
          ssh -o StrictHostKeyChecking=no -i deploy_key ubuntu@$EC2_HOST "
            cd /home/ubuntu/communityboard-team-3 &&
            git pull origin main &&
            docker compose down &&
            docker compose up -d --build
          "
          rm deploy_key
