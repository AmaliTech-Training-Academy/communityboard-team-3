services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: communityboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/communityboard
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-communityboard-secret-key-amalitech-2024}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/api/categories || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  data-seed:
    build: ./data-engineering
    command: python seed_data.py
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: communityboard
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  data-etl:
    build: ./data-engineering
    command: python -m etl.pipeline
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: communityboard
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      data-seed:
        condition: service_completed_successfully

volumes:
  pgdata:
